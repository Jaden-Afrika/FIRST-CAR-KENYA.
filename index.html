<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Car Kenya</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>First Car Kenya</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="inventory.html">Inventory</a>
            <a href="financing.html">Financing</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="search-box">
            <input id="searchInput" type="text" placeholder="Search by make or model...">
            <button id="searchButton">Find My Car</button>
        </div>
        <p id="status" class="search-status"></p>
    </section>

    <main class="content">
      <h2>Latest Arrivals</h2>
      <div class="grid" id="carGrid"></div>
    </main>

    <!-- Car Details Modal -->
    <div class="details-modal" id="detailsModal">
      <div class="details-content">
        <button class="close-btn" id="closeBtn">&times;</button>
        <div class="details-body">
          <div class="details-image">Image</div>
          <div class="details-info">
            <h2 id="detailsTitle"></h2>
            <p><strong>Year:</strong> <span id="detailsYear"></span></p>
            <p><strong>Make:</strong> <span id="detailsMake"></span></p>
            <p><strong>Model:</strong> <span id="detailsModel"></span></p>
            <p><strong>Price:</strong> <span id="detailsPrice"></span></p>
            <p><strong>Fuel Type:</strong> <span id="detailsFuel"></span></p>
            <button class="btn-primary">Contact Us for More Info</button>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js" defer></script>
</body>
</html>
